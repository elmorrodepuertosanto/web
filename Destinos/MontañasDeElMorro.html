    <script>
document.addEventListener('DOMContentLoaded', function() {

    const botonesInicio = document.querySelectorAll('a[href*="index.html"], a[href="/"], a[href*="index"], .btn-inicio');
    botonesInicio.forEach(btn => {

        });
    });
});
